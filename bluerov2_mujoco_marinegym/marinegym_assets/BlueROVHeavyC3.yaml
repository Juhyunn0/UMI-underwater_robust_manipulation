# BlueROV2 Heavy + MarineSitu C3 stereo camera on its C3-BR bracket (heavy_c3).
#
# EXACTLY the lab's Onshape assembly: heavy + C3 only (the Newton gripper is NOT in
# Onshape yet, so it is absent — see heavy_gripper / BlueROVHeavyGripper.yaml for the
# future config that adds it). Derived from BlueROVHeavy.yaml. ONLY volume and coBM change:
#   volume: 0.0116499 + C3 1.274e-3 (1700-430 g / rho 997) = 0.0129237 m^3
#           -> net buoyancy ~ -3.1 N (SINKS; the C3 is negatively buoyant and no trim
#           foam is modeled, per the 2026-07-12 no-foam decision).
#   coBM:   volume-weighted CB_z minus composite-COM_z = +0.01372 m
#           (compute_payload_inertia.compose_c3()/buoyancy_c3(); the generated MJCF
#           re-origins the body frame at the composite COM. hydro.py models only this z
#           offset — the CB_x-COM_x mismatch leaves ~0.8 N*m static pitch moment unmodeled,
#           countered by the PID rp-leveling / the NMPC's EAOB).
#
# added_mass / damping are the UNCHANGED heavy (Wu 2018) set — DELIBERATE (same
# HOLD-until-own-system-ID policy as heavy / heavy_gripper): the C3 increment
# (box 95x165x89 mm, level, lens fwd) is dXu'/dZw' ~ +0.5..0.9 kg (+9%/+6% worst-case),
# dYv' ~ +0.4 kg (+3%) — small vs the 30-100% spread between published BlueROV2 sets;
# documented here but NOT applied. -> revisit with in-situ system ID.
