# Disturbance-comparison experiment — shallow Monterey Bay, swell-dominated.
# All params here; change modes/seeds/scenario with NO code edit.
# Frame: FLU (z up). Oceanographic depth convention: surface z=0, seabed z=-h.

site:
  h: 4.0            # water-column depth [m] (seabed at z=-4); finite-depth dispersion uses tanh(k*h)
  z_ROV: -3.0       # ROV operating depth (oceanographic z, up from surface); 1 m above seabed

waves:
  Hs: 0.75          # significant wave height [m]
  Tp: 12.0          # peak period [s]  -> kh ~= 0.34 (shallow/intermediate)
  gamma: 5.0        # JONSWAP peak factor
  s: 30             # cos^{2s} directional spreading (large = narrow)
  beta_bar_deg: 0.0 # mean wave heading [deg] (FLU world)
  N_omega: 60
  N_beta: 21
  omega_min: 0.2
  omega_max: 1.6    # [rad/s]

current:
  V_bar_c: 0.20         # mean current speed [m/s]
  theta_c_deg: 0.0      # mean current heading [deg]
  tau: 300.0            # Gauss-Markov drift correlation time [s]
  sigma_inf_frac: 0.1   # drift stationary std = 0.1 * V_bar_c
  v_z_range: [-0.03, 0.03]  # constant small vertical current [m/s], drawn once per seed

inertia:                # Froude-Krylov wave-inertia force injected via external_wrench
  rho: 1025.0           # seawater density [kg/m^3] (FK term; hydro buoyancy still uses 997)
  vol: 0.0113459        # displaced volume [m^3] (BlueROV.yaml)
  fk_mode: froude_krylov  # froude_krylov (C_M=1, recommended) | morison_ca | off
  C_M: 1.0
  C_D: 1.2              # carried for metadata only — NOT injected (hull D-matrix owns drag)
  A_x: 0.10             # reference areas [m^2] — metadata only
  A_z: 0.15
  added_mass_xyz: [5.5, 12.7, 14.57]  # only used if fk_mode=morison_ca

sim:
  dt: 0.002             # informational; the real dt comes from the MJCF (model.opt.timestep)
  T_sim: 120.0          # seconds per run
  log_hz: 20.0          # logging rate (matches the control tick)

experiment:
  controllers: [pid, mpc, dobmpc]
  record_runs: false    # also write per-run CSV+meta via Recorder (large; off by default)
  settle_s: 10.0        # steady-state window start [s]
  settle_band_cm: 5.0   # settling-time band (radial error) [cm]
  primary:              # rejection quantification — DP station-keeping
    scenario: dp
    modes: [C, CD, CW, CDW]
    seeds: [0, 1, 2, 3, 4]
    start: [0.1, 0.05, 0.0]   # initial offset from the origin setpoint [m]
    depth: 0.0                # DP hold depth (FLU body z)
  secondary:            # tracking robustness — square trajectory (fewer seeds)
    scenario: square
    modes: [CW, CDW]
    seeds: [0, 1, 2]
    size: 1.0
    laps: 2
    speed: 0.15
    depth: 0.0
